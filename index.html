<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patel Store Billing</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Patel Store</h1>
        <p>Kurebhar</p>

        <div id="date"></div>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search item..." class="input">

        <!-- Customer Details -->
        <div class="customer">
            <label>Customer Name:</label>
            <input type="text" id="customerName" placeholder="Optional" class="input">

            <label>Mobile Number:</label>
            <input type="text" id="mobile" placeholder="Optional" class="input">
        </div>

        <h2>Items</h2>
        <div id="items-list"></div>

        <div class="discount">
            <label>Discount (%): </label>
            <input type="number" id="discount" value="0" min="0" max="100">
        </div>

        <button id="calculateBtn">OK</button>
        <button id="downloadPdf">Download PDF</button>

        <h2>Bill</h2>
        <div id="bill"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
